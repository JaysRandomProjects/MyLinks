<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Program Manager</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #008080;
    background-image:
      repeating-conic-gradient(#008080 0% 25%, #017d7d 0% 50%);
    background-size: 4px 4px;
    font-family: "MS Sans Serif", "Tahoma", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .window {
    width: 340px;
    background: #c0c0c0;
    border: 2px solid #fff;
    border-right-color: #000;
    border-bottom-color: #000;
    box-shadow: 1px 1px 0 #000;
  }

  .titlebar {
    background: linear-gradient(90deg, #000080, #1084d0);
    color: #fff;
    font-weight: bold;
    font-size: 13px;
    padding: 3px 4px 3px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    letter-spacing: 0.5px;
  }

  .titlebar .title {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .titlebar .icon {
    width: 14px;
    height: 14px;
    background: #c0c0c0;
    border: 1px solid #000;
    display: inline-block;
  }

  .titlebar .controls {
    display: flex;
    gap: 2px;
  }

  .titlebar button {
    width: 16px;
    height: 14px;
    background: #c0c0c0;
    border: 1px solid #fff;
    border-right-color: #000;
    border-bottom-color: #000;
    font-size: 10px;
    line-height: 1;
    padding: 0;
    font-family: monospace;
    cursor: default;
  }

  .menubar {
    background: #c0c0c0;
    border-bottom: 1px solid #808080;
    padding: 2px 6px;
    font-size: 12px;
    display: flex;
    gap: 14px;
    color: #000;
  }

  .menubar span {
    padding: 1px 3px;
  }

  .body {
    padding: 14px;
    border-top: 1px solid #808080;
  }

  .headline {
    text-align: center;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 4px;
    color: #000080;
  }

  .subline {
    text-align: center;
    font-size: 11px;
    margin-bottom: 14px;
    color: #333;
  }

  .link-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: #c0c0c0;
    border: 2px solid #fff;
    border-right-color: #000;
    border-bottom-color: #000;
    padding: 8px 10px;
    margin-bottom: 8px;
    font-family: inherit;
    font-size: 13px;
    color: #000;
    text-decoration: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .link-btn:active {
    border: 2px solid #000;
    border-right-color: #fff;
    border-bottom-color: #fff;
    padding: 9px 9px 7px 11px;
  }

  .link-btn .glyph {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #000;
    padding: 2px;
  }

  .link-btn .glyph svg {
    width: 100%;
    height: 100%;
  }

  .statusbar {
    border-top: 1px solid #808080;
    background: #c0c0c0;
    font-size: 11px;
    padding: 3px 8px;
    color: #000;
    display: flex;
    justify-content: space-between;
  }

  .statusbar .cell {
    border: 1px solid #808080;
    border-right-color: #fff;
    border-bottom-color: #fff;
    padding: 1px 8px;
  }
</style>
